; Ofelia scheduler — local replacement for the Helm CronJob.
; Triggers a fresh portfolio-wide forecast run every month on the 1st at 06:00.
;
; To test the schedule manually without waiting for month-end, change the
; schedule below to something like "@every 5m" and run `docker compose up -d
; ofelia` again.

[job-run "monthly-run"]
schedule = 0 6 1 * *
image = curlimages/curl:latest
network = bitirme_default
command = curl -fsS -X POST http://controller:9000/runs -H "Content-Type: application/json" -d "{\"concurrency\":4,\"check_drift\":true}"
