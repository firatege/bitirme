apiVersion: 1
datasources:
  - name: Bitirme Postgres
    uid: bitirme-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: false
deleteDatasources:
  - name: Bitirme Postgres
    orgId: 1
