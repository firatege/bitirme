# React + Vite SPA served by nginx. Image is built with VITE_API_BASE_URL=https://<DOMAIN>/api
# and VITE_GRAFANA_URL=https://<DOMAIN>/grafana baked in (see deploy/scripts/deploy.sh).
app:
  name: dashboard
  port: 80

probes:
  liveness:
    httpGet:    { path: /, port: app }
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    httpGet:    { path: /, port: app }
    initialDelaySeconds: 2
    periodSeconds: 10

resources:
  requests: { cpu: "50m",  memory: "64Mi" }
  limits:   { cpu: "500m", memory: "256Mi" }

ingress:
  enabled: true
  path: /
  pathType: Prefix
