server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — every unknown path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets, never the index.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Tiny health endpoint so probes don't return a 200'd HTML payload.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        default_type text/plain;
    }
}
